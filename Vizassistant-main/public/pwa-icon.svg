<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0a1e"/>
      <stop offset="1" stop-color="#1a0a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="92" ry="92" fill="url(#bg)"/>

  <!-- Glow halo -->
  <circle cx="256" cy="248" r="210" fill="url(#glow)"/>

  <!-- Floating dots for data feel -->
  <circle cx="140" cy="160" r="8" fill="#a78bfa" opacity="0.4"/>
  <circle cx="372" cy="160" r="8" fill="#a78bfa" opacity="0.4"/>
  <circle cx="100" cy="340" r="6" fill="#a78bfa" opacity="0.3"/>
  <circle cx="412" cy="340" r="6" fill="#a78bfa" opacity="0.3"/>
  <line x1="140" y1="160" x2="372" y2="160" stroke="#7c3aed" stroke-width="2" opacity="0.25"/>
  <line x1="100" y1="340" x2="412" y2="340" stroke="#7c3aed" stroke-width="2" opacity="0.2"/>

  <!-- Large "V" -->
  <text
    x="256" y="340"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="308"
    text-anchor="middle"
    fill="url(#vGrad)"
  >V</text>

  <!-- Sparkle top-right -->
  <g transform="translate(350,100)" opacity="0.8">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="-9" x2="9" y2="9" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Sparkle top-left small -->
  <g transform="translate(162,108)" opacity="0.5">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
