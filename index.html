<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA: Theme color and description -->
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description"
    content="Upload your data and get instant AI-powered charts, insights, and visualizations with Vizassistance." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vizassistance" />

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/viz-logo.svg" />
  <link rel="apple-touch-icon" href="/pwa-192.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Apply theme before React mounts to prevent white flash on refresh -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.classList.add(theme);
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <title>Vizassistance | AI Data Insights</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
